<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Наурыз Құттықтау</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* 1-бет: Басты бет */
        #page1 {
            background: linear-gradient(135deg, #ff9ecf, #ffd6ec);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #ff4fa3;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #e63e8d;
        }

        /* 2-бет: Видео және анимация беті */
        #page2 {
            display: none;
            background: #ffd6ec;
            min-height: 100vh;
            padding-top: 40px;
            position: relative;
            overflow: hidden;
        }

        /* Видео контейнері */
        .video-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            position: relative;
            z-index: 2;
        }

        video {
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background-color: black;
        }

        /* Жұлдыздар мен гүлдер анимациясы */
        .star, .flower {
            position: absolute;
            font-size: 24px;
            animation: float 5s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        .star { color: gold; }
        .flower { color: #ff69b4; }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        #loveText {
            font-size: 24px;
            color: #ff3f9b;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="page1">
    <div class="card">
        <h1>🌸 8 Наурыз Құтты Болсын 🌸</h1>
        <h2>Арайлым!</h2>
        <p>
            Сені 8 наурыз мерекесімен құттықтаймын!<br>  
            Әрқашан күліп жүр, бақытты бол! 💐
        </p>
        <button onclick="openPage2()">Саған кішкентай сыйлық 🎁</button>
    </div>
</div>

<div id="page2">
    <h1>Арайлым 💖</h1>
    <p id="loveText">Сен өте ерекше жансың ✨</p>
    
    <div class="video-container">
        <video id="myVideo" controls playsinline>
            <source src="1234.mp4" type="video/mp4">
            Сіздің браузеріңіз видеоны қолдамайды.
        </video>
    </div>

    <br>
    <button onclick="backPage()">Артқа қайту</button>
</div>

<script>
    function openPage2() {
        document.getElementById("page1").style.display = "none";
        document.getElementById("page2").style.display = "block";
        createStarsAndFlowers();
        
        // Видеоны автоматты түрде қосу (браузер рұқсат берсе)
        const video = document.getElementById("myVideo");
        video.play().catch(error => console.log("Авто-плей блокталып қалды, пайдаланушы өзі қосуы керек."));
    }

    function createStarsAndFlowers() {
        const page2 = document.getElementById("page2");
        for (let i = 0; i < 15; i++) {
            // Жұлдыздар
            let star = document.createElement("div");
            star.className = "star";
            star.style.left = Math.random() * 95 + "%";
            star.style.animationDelay = Math.random() * 5 + "s";
            star.innerHTML = "⭐";
            page2.appendChild(star);

            // Гүлдер
            let flower = document.createElement("div");
            flower.className = "flower";
            flower.style.left = Math.random() * 95 + "%";
            flower.style.animationDelay = Math.random() * 5 + "s";
            flower.innerHTML = "🌸";
            page2.appendChild(flower);
        }
    }

    function backPage() {
        const video = document.getElementById("myVideo");
        video.pause(); // Артқа қайтқанда видеоны тоқтату
        document.getElementById("page2").style.display = "none";
        document.getElementById("page1").style.display = "flex";
    }
</script>

</body>
</html>
