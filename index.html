<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Наурыз Құттықтау</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; text-align: center; overflow-x: hidden; background: #ffd6ec; }
        
        #page1 { background: linear-gradient(135deg,#ff9ecf,#ffd6ec); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 85%; max-width: 400px; }
        button { margin-top: 20px; padding: 15px 30px; border: none; border-radius: 15px; background: #ff4fa3; color: white; font-size: 16px; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { background: #e63e8d; }

        #page2 { display: none; min-height: 100vh; padding-top: 20px; position: relative; }
        .gallery { display: flex; justify-content: center; margin-top: 15px; padding: 0 10px; }
        
        /* Видео өлшемін осы жерден өзгерте аласыз */
        video { 
            width: 80%;           /* Экранның 80%-ын алады */
            max-width: 300px;      /* Ең үлкен өлшемі 300 пиксельден аспайды */
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            background-color: black; 
        }
        
        .star, .flower { position: absolute; font-size: 20px; animation: float 5s linear infinite; pointer-events: none; z-index: 1; }
        .star { color: gold; }
        .flower { color: #ff69b4; }
        @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        
        #loveText { font-size: 20px; color: #ff3f9b; margin: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="page1">
    <div class="card">
        <h1>🌸 8 Наурыз 🌸</h1>
        <h2>Арайлым!</h2>
        <p>Сені мерекеңмен құттықтаймын! Әрқашан күліп жүр! 💐</p>
        <button onclick="openPage2()">Сыйлықты ашу 🎁</button>
    </div>
</div>

<div id="page2">
    <h1>Арайлым 💖</h1>
    <p id="loveText">Сен өте ерекше жансың ✨</p>
    
    <div class="gallery">
        <video id="myVideo" controls playsinline>
            <source src="123456.mp4" type="video/mp4">
            Браузеріңіз бұл видеоны қолдамайды.
        </video>
    </div>
    
    <br><br>
    <button onclick="backPage()" style="width: 200px;">Артқа қайту</button>
</div>



<script>
    function openPage2() {
        document.getElementById("page1").style.display = "none";
        document.getElementById("page2").style.display = "block";
        
        const video = document.getElementById("myVideo");
        video.currentTime = 0; 
        video.play(); 
        
        createStarsAndFlowers();
    }

    function backPage() {
        const video = document.getElementById("myVideo");
        video.pause(); 
        document.getElementById("page2").style.display = "none";
        document.getElementById("page1").style.display = "flex";
    }

    function createStarsAndFlowers() {
        const page2 = document.getElementById("page2");
        for(let i=0; i<15; i++) {
            let star = document.createElement("div");
            star.className = "star";
            star.style.left = Math.random()*90 + "%";
            star.style.animationDelay = Math.random()*5 + "s";
            star.innerHTML = "⭐";
            page2.appendChild(star);
            
            let flower = document.createElement("div");
            flower.className = "flower";
            flower.style.left = Math.random()*90 + "%";
            star.style.animationDelay = Math.random()*5 + "s";
            flower.innerHTML = "🌸";
            page2.appendChild(flower);
        }
    }
</script>

</body>
</html>
