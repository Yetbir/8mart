<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Наурыз Құттықтау</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; text-align: center; overflow-x: hidden; background: #ffd6ec; }
        
        #page1 { background: linear-gradient(135deg,#ff9ecf,#ffd6ec); height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Телефонда карточка толық экранды иеленуі үшін */
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 85%; max-width: 400px; }
        
        button { margin-top: 20px; padding: 15px 30px; border: none; border-radius: 15px; background: #ff4fa3; color: white; font-size: 16px; cursor: pointer; width: 100%; }

        #page2 { display: none; min-height: 100vh; padding-top: 20px; position: relative; }
        
        /* Видео контейнері телефонда толық көрінуі үшін */
        .gallery { display: flex; justify-content: center; margin-top: 20px; padding: 0 10px; }
        video { width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .star, .flower { position: absolute; font-size: 20px; pointer-events: none; }
        #loveText { font-size: 20px; color: #ff3f9b; margin: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="page1">
    <div class="card">
        <h1>🌸 8 Наурыз 🌸</h1>
        <h2>Арайлым!</h2>
        <p>Сені мерекеңмен құттықтаймын! Әрқашан күліп жүр! 💐</p>
        <button onclick="openPage2()">Сыйлықты ашу 🎁</button>
    </div>
</div>

<div id="page2">
    <h1>Арайлым 💖</h1>
    <p id="loveText">Сен өте ерекше жансың ✨</p>
    
    <div class="gallery">
        <video id="myVideo" controls playsinline>
            <source src="123456.mp4" type="video/mp4">
            Браузеріңіз қолдамайды.
        </video>
    </div>
    
    <audio id="bgMusic" loop>
        <source src="123456 (audio-extractor.net).mp3" type="audio/mpeg">
    </audio>
    
    <br><br>
    <button onclick="backPage()" style="width: 200px;">Артқа қайту</button>
</div>



<script>
    function openPage2() {
        document.getElementById("page1").style.display = "none";
        document.getElementById("page2").style.display = "block";
        const video = document.getElementById("myVideo");
        const music = document.getElementById("bgMusic");
        video.play(); 
        music.play();
    }

    function backPage() {
        const video = document.getElementById("myVideo");
        const music = document.getElementById("bgMusic");
        video.pause(); music.pause(); music.currentTime = 0;
        document.getElementById("page2").style.display = "none";
        document.getElementById("page1").style.display = "flex";
    }
</script>

</body>
</html>
